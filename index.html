<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>导航制作</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
 <style>
        body {
            background-color: #f0ead2;
            font-family: "Microsoft YaHei", sans-serif;
            color: #3d2b1f;
        }
        .stardew-card {
            background: #fefae0;
            border: 3px solid #606c38;
            border-radius: 12px;
            box-shadow: 0 4px 0 #4a4a4a;
        }
        .stardew-btn {
            background: #606c38;
            border: none;
            color: white;
            font-weight: bold;
            box-shadow: 0 3px 0 #3e4723;
        }
        .stardew-btn:hover {
            background: #4a5729;
        }
        .navbar {
            background: #bc6c25 !important;
            border-bottom: 4px solid #606c38;
        }
        .nav-link {
            color: #fff !important;
            font-weight: bold;
            font-size: 1.1rem;
        }
        .nav-link:hover {
            color: #fefae0 !important;
        }
    </style>
</head>
<body>

<!-- 导航栏 -->
<nav class="navbar navbar-expand-lg navbar-dark mb-4">
    <div class="container">
        <a class="navbar-brand fw-bold" href="index.html">🌾 我的主页</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="menu">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="index.html">首页</a></li>
                <li class="nav-item"><a class="nav-link" href="about.html">关于我</a></li>
                <li class="nav-item"><a class="nav-link" href="works.html">作品</a></li>
                <li class="nav-item"><a class="nav-link" href="skills.html">技能</a></li>
            </ul>
        </div>
    </div>
</nav>

<!-- 内容区 -->
<div class="container mb-5">
    <div class="stardew-card p-4 p-md-5 text-center">
        <h1 class="fw-bold mb-3" style="color:#606c38">欢迎来到我个人网页</h1>
        <p class="lead fs-5">用热爱耕耘，用创意收获。</p>
        <hr class="my-4 border-3 border-success opacity-50">
        <p class="mb-4">这里记录了我的生活、技能、作品与故事</p>
        <a href="works.html" class="btn stardew-btn btn-lg px-4">查看我的作品 🎨</a>
    </div>

    <div class="row g-4 mt-4">
        <div class="col-md-6 col-lg-3">
            <div class="stardew-card p-4 text-center h-100">
                <h3 class="text-success">🌱 关于我</h3>
                <p>热爱生活、喜欢设计与编程的田园风创作者。</p>
                <a href="about.html" class="btn stardew-btn mt-auto">了解更多</a>
            </div>
        </div>
        <div class="col-md-6 col-lg-3">
            <div class="stardew-card p-4 text-center h-100">
                <h3 class="text-warning">🎨 作品</h3>
                <p>设计、编程、像素画、创意项目全都在这里。</p>
                <a href="works.html" class="btn stardew-btn mt-auto">浏览作品</a>
            </div>
        </div>
        <div class="col-md-6 col-lg-3">
            <div class="stardew-card p-4 text-center h-100">
                <h3 class="text-info">🛠️ 技能</h3>
                <p>前端开发、设计、剪辑、创作技能一览。</p>
                <a href="skills.html" class="btn stardew-btn mt-auto">查看技能</a>
            </div>
        </div>
        <div class="col-md-6 col-lg-3">
            <div class="stardew-card p-4 text-center h-100">
                <h3 class="text-danger">💌 留言</h3>
                <p>欢迎交流想法，一起在热爱的世界里成长。</p>
                <button class="btn stardew-btn mt-auto">联系我</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>


</body>
</html>
